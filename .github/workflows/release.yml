name: Build & Release

on:
  push:
    tags:
      - 'v*'

env:
  SCHEME: GreyEminence
  PRODUCT_NAME: "Grey Eminence"
  XCODEGEN_VERSION: "2.42.0"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Restore entitlements
        run: |
          cat > GreyEminence/GreyEminence.entitlements << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.app-sandbox</key>
              <true/>
              <key>com.apple.security.device.audio-input</key>
              <true/>
              <key>com.apple.security.network.client</key>
              <true/>
              <key>com.apple.security.files.user-selected.read-write</key>
              <true/>
              <key>com.apple.security.personal-information.calendars</key>
              <true/>
              <key>com.apple.security.temporary-exception.mach-lookup.global-name</key>
              <array>
                  <string>$(PRODUCT_BUNDLE_IDENTIFIER)-spks</string>
                  <string>$(PRODUCT_BUNDLE_IDENTIFIER)-spki</string>
              </array>
          </dict>
          </plist>
          EOF

      - name: Import signing certificate
        env:
          DEVELOPER_ID_CERTIFICATE: ${{ secrets.DEVELOPER_ID_CERTIFICATE }}
          DEVELOPER_ID_PASSWORD: ${{ secrets.DEVELOPER_ID_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$DEVELOPER_ID_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$DEVELOPER_ID_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm "$RUNNER_TEMP/certificate.p12"

          # Allow codesign to access the keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project GreyEminence.xcodeproj \
            -scheme "$SCHEME"

      - name: Run tests
        run: |
          xcodebuild test \
            -project GreyEminence.xcodeproj \
            -scheme "$SCHEME" \
            -destination "platform=macOS,arch=arm64" \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Build archive
        run: |
          BUILD_TIMESTAMP=$(date -u +"%Y%m%d%H%M%S")
          echo "BUILD_TIMESTAMP=$BUILD_TIMESTAMP" >> $GITHUB_ENV
          xcodebuild archive \
            -project GreyEminence.xcodeproj \
            -scheme "$SCHEME" \
            -destination "platform=macOS,arch=arm64" \
            -archivePath "$RUNNER_TEMP/GreyEminence.xcarchive" \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            CODE_SIGN_STYLE=Manual \
            CURRENT_PROJECT_VERSION="$BUILD_TIMESTAMP" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            ENABLE_HARDENED_RUNTIME=YES \
            OTHER_CODE_SIGN_FLAGS="--options=runtime"

      - name: Export app
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>developer-id</string>
              <key>teamID</key>
              <string>${{ secrets.APPLE_TEAM_ID }}</string>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/GreyEminence.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export"

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH="$RUNNER_TEMP/export/$PRODUCT_NAME.app"

          # Create zip for notarization
          ditto -c -k --keepParent "$APP_PATH" "$RUNNER_TEMP/notarize.zip"

          # Submit for notarization
          SUBMIT_OUTPUT=$(xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait 2>&1) || true
          echo "$SUBMIT_OUTPUT"

          # Extract submission ID and check status
          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep "id:" | head -1 | awk '{print $2}')
          if echo "$SUBMIT_OUTPUT" | grep -q "status: Invalid"; then
            echo "Notarization failed. Fetching log..."
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" || true
            exit 1
          fi

          # Staple the notarization ticket
          xcrun stapler staple "$APP_PATH"

      - name: Create DMG
        run: |
          APP_PATH="$RUNNER_TEMP/export/$PRODUCT_NAME.app"
          DMG_PATH="$RUNNER_TEMP/GreyEminence.dmg"

          brew install create-dmg

          create-dmg \
            --volname "Grey Eminence" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 128 \
            --icon "$PRODUCT_NAME.app" 165 180 \
            --app-drop-link 495 180 \
            --hide-extension "$PRODUCT_NAME.app" \
            "$DMG_PATH" \
            "$APP_PATH"

      - name: Sign update with Sparkle EdDSA key
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          DMG_PATH="$RUNNER_TEMP/GreyEminence.dmg"

          # Find Sparkle sign_update tool
          SIGN_UPDATE=$(find ~/Library/Developer/Xcode/DerivedData -name "sign_update" -path "*/Sparkle/bin/*" | head -1)
          if [ -z "$SIGN_UPDATE" ]; then
            echo "sign_update not found, downloading Sparkle tools..."
            curl -L -o /tmp/sparkle.tar.xz https://github.com/sparkle-project/Sparkle/releases/latest/download/Sparkle-2.6.4.tar.xz
            mkdir -p /tmp/sparkle && tar -xf /tmp/sparkle.tar.xz -C /tmp/sparkle
            SIGN_UPDATE="/tmp/sparkle/bin/sign_update"
          fi

          # Sign the DMG
          SIGNATURE=$(echo "$SPARKLE_PRIVATE_KEY" | "$SIGN_UPDATE" "$DMG_PATH" --ed-key-file -)
          echo "SPARKLE_SIGNATURE=$SIGNATURE" >> $GITHUB_ENV
          echo "DMG size: $(stat -f%z "$DMG_PATH")"

      - name: Generate appcast.xml
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUILD_NUMBER="${BUILD_TIMESTAMP}"
          DMG_PATH="$RUNNER_TEMP/GreyEminence.dmg"
          DMG_SIZE=$(stat -f%z "$DMG_PATH")

          # Parse signature components (edSignature and length from sign_update output)
          ED_SIGNATURE=$(echo "$SPARKLE_SIGNATURE" | grep -o 'sparkle:edSignature="[^"]*"' | cut -d'"' -f2)
          LENGTH=$(echo "$SPARKLE_SIGNATURE" | grep -o 'length="[^"]*"' | cut -d'"' -f2)

          echo "Version: ${VERSION}, Build: ${BUILD_NUMBER}"

          cat > "$RUNNER_TEMP/appcast.xml" << APPCAST_EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>Grey Eminence</title>
              <item>
                <title>Version ${VERSION}</title>
                <pubDate>$(date -R)</pubDate>
                <sparkle:version>${BUILD_NUMBER}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>14.2</sparkle:minimumSystemVersion>
                <enclosure
                  url="https://github.com/mpurdon/greyeminence/releases/download/v${VERSION}/GreyEminence.dmg"
                  ${SPARKLE_SIGNATURE}
                  type="application/octet-stream"
                />
              </item>
            </channel>
          </rss>
          APPCAST_EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ runner.temp }}/GreyEminence.dmg
            ${{ runner.temp }}/appcast.xml
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
