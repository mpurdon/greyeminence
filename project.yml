name: GreyEminence
options:
  bundleIdPrefix: com.greyeminence
  deploymentTarget:
    macOS: "14.2"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.2"
    ENABLE_USER_SCRIPT_SANDBOXING: false
    SWIFT_STRICT_CONCURRENCY: complete

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "0.9.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess
    from: "4.2.2"
  FluidAudio:
    path: LocalPackages/FluidAudio

targets:
  GreyEminence:
    type: application
    platform: macOS
    sources:
      - path: GreyEminence
    resources:
      - path: GreyEminence/Resources
    settings:
      base:
        SWIFT_STRICT_CONCURRENCY: complete
        PRODUCT_BUNDLE_IDENTIFIER: com.greyeminence.app
        INFOPLIST_FILE: GreyEminence/Info.plist
        CODE_SIGN_ENTITLEMENTS: GreyEminence/GreyEminence.entitlements
        PRODUCT_NAME: Grey Eminence
        MARKETING_VERSION: "0.8.2"
        CURRENT_PROJECT_VERSION: "20260403190000"
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        ARCHS: arm64
    dependencies:
      - package: WhisperKit
      - package: Sparkle
      - package: KeychainAccess
      - package: FluidAudio
        product: FluidAudio
    entitlements:
      path: GreyEminence/GreyEminence.entitlements
